name: Build and Release Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  APP_DIR: app
  OUTPUT_APK: app/build/outputs/apk/release/app-release.apk

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # -----------------------------
      # Checkout repo (full history for changelog)
      # -----------------------------
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # -----------------------------
      # Setup Java
      # -----------------------------
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # -----------------------------
      # Read config from gradle.properties
      # -----------------------------
      - name: Read app config
        id: config
        run: |
          VERSION=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)
          APP_NAME=$(grep '^APP_NAME=' gradle.properties | cut -d= -f2)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      # -----------------------------
      # Build signed APK
      # -----------------------------
      - name: Build signed APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks

          ./gradlew clean assembleRelease

      # -----------------------------
      # Prepare artifacts
      # -----------------------------
      - name: Prepare release artifacts
        run: |
          APP=${{ steps.config.outputs.app_name }}
          VERSION=${{ steps.config.outputs.version }}

          mkdir release

          FINAL_APK="${APP}-${VERSION}.apk"

          cp $OUTPUT_APK "release/$FINAL_APK"

          cd release
          sha256sum "$FINAL_APK" > "$FINAL_APK.sha256"

      # -----------------------------
      # Create / update GitHub release
      # -----------------------------
      - name: Create GitHub release
        run: |
          gh release create v${{ steps.config.outputs.version }} \
            release/*.apk \
            release/*.sha256 \
            --title "${{ steps.config.outputs.app_name }} v${{ steps.config.outputs.version }}" \
            --notes "Release of Remote PC Control App version ${{ steps.version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}